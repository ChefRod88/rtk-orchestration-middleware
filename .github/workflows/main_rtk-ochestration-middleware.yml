name: Build and deploy .NET isolated Azure Functions (R2K.Backend)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  FUNCTION_PROJECT: 'R2K.Backend/R2K.Backend.csproj'
  PUBLISH_DIR: '${{ github.workspace }}/func-publish'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore and publish Functions app
        run: |
          dotnet restore "${{ env.FUNCTION_PROJECT }}"
          dotnet publish "${{ env.FUNCTION_PROJECT }}" \
            --configuration Release \
            --no-restore \
            --output "${{ env.PUBLISH_DIR }}" \
            --verbosity minimal

      - name: Upload published Function App
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-isolated-functions
          path: ${{ env.PUBLISH_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-isolated-functions
          path: func-package

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_19084E5062ED424A8D21484A83B093A4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_C2C6777940DA4535B97FC9289CF742BC }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_162AC1BAE421435886A2BDEFFF47216A }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: rtk-ochestration-middleware
          package: ${{ github.workspace }}/func-package
